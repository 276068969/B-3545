<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器错误 | 麻将战绩</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0d1b2a; color:#eef2f7; min-height:100vh; display:flex; align-items:center; }
        .error-code { font-size:6rem; font-weight:800; color:#c9a227; line-height:1; }
        .error-icon { font-size:4rem; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-code">500</div>
            <div class="error-icon mt-2">⚙️</div>
            <h3 class="mt-3">服务器开小差了</h3>
            <p class="text-secondary mt-2">
                服务器内部出现了一些问题，我们正在处理中。<br>
                请稍后再试。
            </p>
            <a href="/" class="btn btn-warning mt-3 fw-bold">返回首页</a>
        </div>
    </div>
</div>
</body>
</html>
