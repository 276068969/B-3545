{% extends 'base.html' %}
{% block title %}编辑资料{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-dark">
                <div class="card-header-dark">
                    <h5 class="mb-0"><i class="bi bi-pencil text-gold"></i> 编辑个人资料</h5>
                </div>
                <div class="card-body-dark">
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label text-light">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-gold">
                                <i class="bi bi-check-lg"></i> 保存修改
                            </button>
                            <a href="/accounts/profile/" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
